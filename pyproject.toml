[tool.uv.workspace]
members = ["packages/*"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["packages/flow-speckit/src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.mypy]
strict = true
python_version = "3.11"
mypy_path = "packages/flow-speckit/src"

[[tool.mypy.overrides]]
module = ["pgserver", "deepdiff", "deepdiff.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages/flow-speckit/tests"]
