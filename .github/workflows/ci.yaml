name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { python-version: "3.11" }
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run mypy packages/flow-speckit/src
      - run: uv run pytest -q
