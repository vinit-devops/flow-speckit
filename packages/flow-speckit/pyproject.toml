[project]
name = "flow-speckit"
version = "0.1.0.dev0"
description = "Durable, artifact-driven AI-SDLC workflow orchestration"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
  "pydantic>=2.7",
  "pydantic-settings>=2.2",
  "sqlalchemy[asyncio]>=2.0.30",
  "asyncpg>=0.29",
  "alembic>=1.13",
  "typer>=0.12",
  "rich>=13.7",
  "structlog>=24.1",
  "deepdiff>=7.0",
]

[project.optional-dependencies]
embedded-pg = ["pgserver>=0.1.4"]

[project.scripts]
flow-speckit = "flow_speckit.cli.app:main"

[project.entry-points."flow_speckit.artifacts"]
generic = "flow_speckit.artifacts.models:GenericArtifact"

[dependency-groups]
dev = [
  "pytest>=8.2",
  "pytest-asyncio>=0.23",
  "ruff>=0.4",
  "mypy>=1.10",
  "pgserver>=0.1.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/flow_speckit"]
